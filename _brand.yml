meta:
  name: EKIO
  link: https://github.com/viniciusoike/shiny-painel-mercado

color:
  palette:
    ekio-blue: "#1E3A5F"
    ekio-blue-dark: "#0D1B2A"
    ekio-blue-light: "#4A90C2"
    ekio-teal: "#2C7A7B"
    ekio-orange: "#DD6B20"
    ekio-amber: "#D69E2E"
    ekio-green: "#38A169"
    ekio-red: "#C53030"
    blue: ekio-blue
    teal: ekio-teal
    orange: ekio-orange
    green: ekio-green
    red: ekio-red
  foreground: "#1A202C"
  background: "#FAFBFC"
  primary: ekio-blue
  secondary: ekio-teal
  success: ekio-green
  info: ekio-blue-light
  warning: ekio-amber
  danger: ekio-red

typography:
  fonts:
    - family: Helvetica Neue
      source: system
  base:
    family: Helvetica Neue
    size: 14px
    line-height: 1.5
  headings:
    family: Helvetica Neue
    weight: 700
